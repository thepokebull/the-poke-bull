<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Airdrops · PACKS</title>
<link rel="icon" href="/pack-logo.png" />
<link rel="stylesheet" href="/theme.css" />
<style>
  .hero{text-align:center;padding:44px 20px 6px}
  .eyebrow{color:var(--yellow);font-weight:800;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase}
  .hero h1{font-size:clamp(34px,6vw,58px);font-weight:800;letter-spacing:-.03em;margin:10px 0 0}
  .hero p{max-width:620px;margin:16px auto 0;color:var(--muted);font-size:16px}
  .stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
  .stat{background:#fff;border:1px solid var(--line2);border-radius:999px;padding:8px 16px;font-size:13.5px;color:var(--dim)}
  .stat b{color:var(--txt)}

  .sec{max-width:1120px;margin:0 auto;padding:24px 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
  .acard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:15px;overflow:hidden;transition:transform .13s,border-color .13s,box-shadow .13s}
  .acard:hover{transform:translateY(-4px);border-color:var(--yellow-deep);box-shadow:0 12px 28px rgba(0,0,0,.45)}
  .acard .imgwrap{aspect-ratio:3/4;background:radial-gradient(circle at 50% 34%,#fff,#f4ecdd);display:grid;place-items:center;overflow:hidden;padding:8px}
  .acard img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45))}
  .acard .body{padding:11px 12px 13px}
  .acard .nm{font-size:12.5px;line-height:1.35;height:34px;overflow:hidden;font-weight:600}
  .acard .row{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .grade{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;color:#fff;white-space:nowrap}
  .g-psa{background:var(--psa)}.g-cgc{background:var(--cgc)}.g-bgs{background:var(--bgs);color:#161616}.g-gem{background:var(--gem);color:#fff}.g-def{background:#9a8f7e}
  .cval{font-size:12.5px;font-weight:800;color:var(--yellow);font-variant-numeric:tabular-nums}
  .to{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:5px}
  .to a{font-family:ui-monospace,monospace;color:var(--txt);text-decoration:none;font-weight:600}
  .to a:hover{color:var(--yellow)}
  .to .sep{opacity:.45;margin:0 1px}
  .acard.fresh{animation:fresh 1.6s ease}
  @keyframes fresh{0%{box-shadow:0 0 0 2px var(--yellow),0 0 34px rgba(255,203,5,.6)}100%{box-shadow:none}}
  .empty{grid-column:1/-1;text-align:center;color:var(--dim);padding:90px 20px;font-size:15px}
  .skel{background:linear-gradient(90deg,#f0e7d6,#f8f1e4,#f0e7d6);background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{to{background-position:-200% 0}}
</style>
</head>
<body>
<header class="site-header">
  <div class="hdr-inner">
    <div class="hdr-left">
      <a class="hdr-brand" href="/">
        <img class="hdr-logo" src="/pack-logo.png" alt="Gacha Packs" />
        <span class="hdr-name">PACKS</span>
      </a>
    </div>
    <div class="hdr-right">
      <nav class="hdr-nav">
        <a class="nav-btn" href="/how">How it works</a>
        <a class="nav-btn" href="/eligibility">Eligibility</a>
        <a class="nav-btn" href="/hall">Hall of Fame</a>
        <a class="nav-btn" href="/airdrops">Airdrops</a>
        <a class="nav-btn" href="/transparency">Transparency</a>
      </nav>
      <a class="icon-btn" href="https://x.com/thegachamachine" aria-label="X" title="X" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>
      </a>
      <a class="icon-btn" href="https://github.com/gachapacks/gacha-packs" aria-label="GitHub" title="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.2 3.44 9.61 8.2 11.16.6.11.82-.26.82-.58 0-.28-.01-1.04-.02-2.04-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.31-.54-1.53.11-3.19 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.19.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .32.22.7.83.58C20.56 21.9 24 17.49 24 12.29 24 5.78 18.63.5 12 .5z"/></svg>
      </a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">Fair distribution</div>
  <h1>Airdrops</h1>
  <p>Every card pulled from the machine and sent to a $PACKS holder.</p>
  <div class="stats">
    <span class="stat"><b id="sTotal">0</b> cards airdropped</span>
    <span class="stat"><b id="sValue">$0.00</b> total value</span>
  </div>
</section>

<section class="sec">
  <div id="grid" class="grid"></div>
</section>

<footer class="footer">
  <div class="fl"><img src="/pack-logo.png" alt="" /><span>Gacha Packs</span></div>
  <div>Powered by <a href="https://courtyard.io/vending-machine/pkmn-pro-pack" target="_blank" rel="noopener">Courtyard</a></div>
</footer>

<div class="toast" id="toast"><span class="tk">✓</span><span id="toastMsg">Copied</span></div>

<script src="/theme.js"></script>
<script>
const $=s=>document.querySelector(s);
const short=a=>a?a.slice(0,4)+"…"+a.slice(-4):"-";
const money=v=>"$"+Number(v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function gradeClass(g){g=(g||"").toUpperCase();if(g.includes("PSA"))return"g-psa";if(g.includes("CGC"))return"g-cgc";if(g.includes("BGS")||g.includes("BECKETT"))return"g-bgs";if(g.includes("GEM")||g.includes("MT"))return"g-gem";return"g-def";}
function toast(m){const t=$("#toast");$("#toastMsg").textContent=m;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1600);}
async function copyText(x){try{await navigator.clipboard.writeText(x);}catch{const t=document.createElement("textarea");t.value=x;t.style.position="fixed";t.style.opacity="0";document.body.appendChild(t);t.select();try{document.execCommand("copy");}catch{}t.remove();}}
const seen=new Set();
function cardHTML(c,fresh){const img=c.image||c.front||"";
  const tx=(c.airdropTx&&c.airdropTx!=="dry-run"&&c.airdropTx.length>40)?c.airdropTx:"";return `
  <div class="acard ${fresh?'fresh':''}">
    <div class="imgwrap">${img?`<img loading="lazy" src="${img}" alt="">`:""}</div>
    <div class="body">
      <div class="nm">${c.name||"Card"}</div>
      <div class="row"><span class="grade ${gradeClass(c.grader||c.grade)}">${c.grade||""}</span>${c.value?`<span class="cval">$${Number(c.value).toLocaleString()}</span>`:""}</div>
      <div class="to"><span>airdropped</span>${tx?` <span class="sep">·</span> <a href="https://polygonscan.com/tx/${tx}" target="_blank" rel="noopener">view tx ↗</a>`:``}</div>
    </div>
  </div>`;}
async function j(u){return (await fetch(u)).json();}

async function load(){
  const g=$("#grid");
  g.innerHTML=Array.from({length:10}).map(()=>'<div class="acard"><div class="imgwrap skel"></div><div class="body"><div class="nm skel" style="height:34px;border-radius:4px"></div></div></div>').join("");
  try{
    const {pulls=[]}=await j("/api/pulls?after=0");
    const drops=pulls.filter(p=>p.airdropTo).reverse(); // newest first
    drops.forEach(p=>seen.add(p.mint||p.ts));
    const stats=await j("/api/stats").catch(()=>({}));
    $("#sTotal").textContent=(stats.airdrops||drops.length).toLocaleString();
    $("#sValue").textContent=money(stats.valueUsd);
    if(!drops.length){ g.innerHTML='<div class="empty"><div>No airdrops yet. Every pulled card will appear here with its recipient.</div></div>'; return; }
    g.innerHTML=drops.map(c=>cardHTML(c,false)).join("");
  }catch(e){ g.innerHTML=`<div class="empty">Couldn't load airdrops: ${e.message}</div>`; }
}
// No live SSE here: the pack-open reveal is shown only on the homepage. This gallery
// loads every airdropped card on page load; newly airdropped cards appear on refresh.
load();
</script>
</body>
</html>
