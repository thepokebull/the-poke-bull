<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hall of Fame · Tauros</title>
<link rel="icon" href="/tauros.png" />
<link rel="stylesheet" href="/theme.css" />
<style>
  .hero{text-align:center;padding:46px 20px 8px}
  .eyebrow{color:var(--yellow);font-weight:800;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase}
  .hero h1{font-size:clamp(34px,6vw,58px);font-weight:800;letter-spacing:-.03em;margin:10px 0 0}
  .hero p{max-width:560px;margin:16px auto 0;color:var(--muted);font-size:16px}
  .stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
  .stat{background:#fff;border:1px solid var(--line2);border-radius:999px;padding:8px 16px;font-size:13.5px;color:var(--dim)}
  .stat b{color:var(--txt)}

  .sec{max-width:820px;margin:0 auto;padding:22px 20px 0}
  .lb{display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:15px;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:14px;padding:11px 16px;transition:transform .13s,border-color .13s,box-shadow .13s}
  .row:hover{transform:translateY(-2px);border-color:var(--yellow-deep);box-shadow:0 10px 26px rgba(0,0,0,.42)}
  .rank{font-size:19px;font-weight:800;color:var(--dim);width:40px;text-align:center;flex:none;font-variant-numeric:tabular-nums}
  .row.t1 .rank,.row.t2 .rank,.row.t3 .rank{color:var(--yellow)}
  .row.t1{border-color:var(--yellow-deep);box-shadow:0 0 0 1px rgba(255,203,5,.22),0 12px 30px rgba(255,203,5,.07)}
  .thumb{width:50px;height:68px;flex:none;border-radius:8px;object-fit:contain;padding:3px;
    background:radial-gradient(circle at 50% 34%,#fff,#f4ecdd);filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
  .meta{flex:1;min-width:0}
  .meta .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .sub{margin-top:6px;display:flex;align-items:center;gap:8px}
  .grade{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:6px;color:#fff;white-space:nowrap}
  .g-psa{background:var(--psa)}.g-cgc{background:var(--cgc)}.g-bgs{background:var(--bgs);color:#161616}.g-gem{background:var(--gem);color:#fff}.g-def{background:#9a8f7e}
  .yr{font-size:12px;color:var(--dim)}
  .val{font-size:16.5px;font-weight:800;color:var(--yellow);flex:none;white-space:nowrap;font-variant-numeric:tabular-nums}
  .empty{text-align:center;color:var(--dim);padding:80px 20px;font-size:15px}
  .skel{background:linear-gradient(90deg,#f0e7d6,#f8f1e4,#f0e7d6);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:14px;height:92px}
  @keyframes sh{to{background-position:-200% 0}}
</style>
</head>
<body>
<header class="site-header">
  <div class="hdr-inner">
    <div class="hdr-left">
      <a class="hdr-brand" href="/">
        <img class="hdr-logo" src="/tauros.png" alt="Tauros" />
        <span class="hdr-name">Tauros</span>
      </a>
    </div>
    <div class="hdr-right">
      <nav class="hdr-nav">
        <a class="nav-btn" href="/how">How it works</a>
        <a class="nav-btn" href="/eligibility">Eligibility</a>
        <a class="nav-btn" href="/hall">Hall of Fame</a>
        <a class="nav-btn" href="/airdrops">Airdrops</a>
        <a class="nav-btn" href="/transparency">Transparency</a>
      </nav>
      <a class="icon-btn" href="https://x.com/thepokebull" aria-label="X" title="X" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>
      </a>
      <a class="icon-btn" href="https://github.com/thepokebull/the-poke-bull" aria-label="GitHub" title="GitHub" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.2 3.44 9.61 8.2 11.16.6.11.82-.26.82-.58 0-.28-.01-1.04-.02-2.04-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.31-.54-1.53.11-3.19 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.19.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22 0 1.6-.01 2.9-.01 3.29 0 .32.22.7.83.58C20.56 21.9 24 17.49 24 12.29 24 5.78 18.63.5 12 .5z"/></svg>
      </a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">Biggest pulls</div>
  <h1>Hall of Fame</h1>
  <p>Every card the machine has pulled, ranked by value — the rarest, most valuable hits at the top.</p>
  <div class="stats">
    <span class="stat"><b id="sCount">0</b> cards pulled</span>
    <span class="stat">top pull <b id="sTop">$0</b></span>
  </div>
</section>

<section class="sec">
  <div id="lb" class="lb"></div>
</section>

<footer class="footer">
  <div class="fl"><img src="/tauros.png" alt="" /><span>Tauros</span></div>
  <div>Powered by <a href="https://gacha.collectorcrypt.com/" target="_blank" rel="noopener">Collector Crypt</a></div>
</footer>

<script src="/theme.js"></script>
<script>
const $=s=>document.querySelector(s);
const money=v=>"$"+Number(v||0).toLocaleString(undefined,{maximumFractionDigits:0});
function gradeClass(g){g=(g||"").toUpperCase();if(g.includes("PSA"))return"g-psa";if(g.includes("CGC"))return"g-cgc";if(g.includes("BGS")||g.includes("BECKETT"))return"g-bgs";if(g.includes("GEM")||g.includes("MT"))return"g-gem";return"g-def";}
function rowHTML(c,i){const rank=i+1;const img=c.image||"";
  return `<div class="row ${rank<=3?'t'+rank:''}">
    <div class="rank">${rank}</div>
    ${img?`<img class="thumb" loading="lazy" src="${img}" alt="">`:`<div class="thumb"></div>`}
    <div class="meta">
      <div class="nm">${c.name||"Card"}</div>
      <div class="sub">
        ${c.grade?`<span class="grade ${gradeClass(c.grader||c.grade)}">${c.gradeText||c.grade}</span>`:""}
        ${c.year?`<span class="yr">${c.year}</span>`:""}
      </div>
    </div>
    <div class="val">${money(c.value)}</div>
  </div>`;}
async function load(){
  const lb=$("#lb");
  lb.innerHTML=Array.from({length:8}).map(()=>'<div class="skel"></div>').join("");
  try{
    const {cards=[]}=await (await fetch("/api/hall")).json();
    $("#sCount").textContent=cards.length.toLocaleString();
    $("#sTop").textContent=money(cards[0]?.value||0);
    if(!cards.length){ lb.innerHTML='<div class="empty">No pulls yet. Every card the machine opens will be ranked here.</div>'; return; }
    lb.innerHTML=cards.map(rowHTML).join("");
  }catch(e){ lb.innerHTML=`<div class="empty">Couldn't load the Hall of Fame: ${e.message}</div>`; }
}
load();
</script>
</body>
</html>
